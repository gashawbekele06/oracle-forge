model_list:
  # ── Direct Anthropic API (requires sk-ant-... key in ANTHROPIC_API_KEY) ──
  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── Via OpenRouter (requires OPENROUTER_API_KEY to be set) ───────────────
  - model_name: openrouter/claude-opus-4-6
    litellm_params:
      model: openrouter/anthropic/claude-opus-4-6
      api_key: os.environ/OPENROUTER_API_KEY

litellm_settings:
  drop_params: true          # silently ignore unsupported OpenAI params
  request_timeout: 600
