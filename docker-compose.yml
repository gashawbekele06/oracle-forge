# ============================================================
# Oracle Forge — Docker Compose
# ============================================================
# Services:
#   postgres  — PostgreSQL 17 for DAB PostgreSQL datasets
#   mongodb   — MongoDB 8 for DAB MongoDB datasets
#   sandbox   — Lightweight Python executor (execute_python tool)
#   agent     — Oracle Forge agent
#
# Quick start:
#   cp .env.example .env      # fill in ANTHROPIC_API_KEY / OPENROUTER_API_KEY
#   docker compose up -d postgres mongodb
#   docker compose run agent python run_benchmark.py --dataset yelp --query_id 1
# ============================================================

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: oracle-forge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-oracleforge}
      POSTGRES_DB: ${PG_DB:-postgres}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount DAB SQL dump files for dataset loading
      - ./DataAgentBench:/dab:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oracle-net

  # ── MongoDB ────────────────────────────────────────────────────────
  mongodb:
    image: mongo:8
    container_name: oracle-forge-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-oracle}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-oracleforge}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
      - ./DataAgentBench:/dab:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oracle-net

  # ── LiteLLM Proxy (Anthropic → OpenAI-compat gateway) ────────────
  # Translates OpenAI SDK calls into Anthropic API calls so the agent
  # can use ANTHROPIC_API_KEY directly without any code changes.
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: oracle-forge-litellm
    restart: unless-stopped
    env_file: .env
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "4001:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health/liveliness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - oracle-net

  # ── Oracle Forge Agent ─────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    container_name: oracle-forge-agent
    env_file: .env
    environment:
      DAB_ROOT: /app/DataAgentBench
      KB_ROOT: /app/kb
      PYTHONPATH: /app:/app/DataAgentBench
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-oracleforge}
      PG_DB: ${PG_DB:-postgres}
      MONGO_URI: mongodb://${MONGO_USER:-oracle}:${MONGO_PASSWORD:-oracleforge}@mongodb:27017/
      # LiteLLM proxy — routes claude-* model names to Anthropic API
      LITELLM_PROXY_URL: http://litellm:4000
    volumes:
      # Mount DataAgentBench (with datasets) — not baked into image
      - ./DataAgentBench:/app/DataAgentBench
      # Mount KB so corrections are persisted on host
      - ./kb:/app/kb
      # Mount results dir
      - ./results:/app/results
      # Mount utils so tests are runnable inside container
      - ./utils:/app/utils
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      # litellm is optional — only needed when using ANTHROPIC_API_KEY (sk-ant-...)
      # Remove hard dependency so agent works with gpt-4o / OpenRouter regardless
    networks:
      - oracle-net
    # Default: show help. Override with:
    #   docker compose run agent python run_benchmark.py --dataset yelp --query_id 1
    command: ["python", "run_benchmark.py", "--help"]

  # ── Oracle Forge MCP Server ────────────────────────────────────────────────
  # Exposes Oracle Forge tools via Model Context Protocol (SSE transport)
  # Compatible with Claude Desktop, Cursor, and any MCP client.
  #
  # Usage:
  #   docker compose up -d oracle-mcp
  #   # Then add to Claude Desktop config:
  #   #   "url": "http://localhost:8000/sse"
  oracle-mcp:
    build:
      context: .
      dockerfile: mcp/Dockerfile
    container_name: oracle-forge-mcp
    restart: unless-stopped
    env_file: .env
    environment:
      DAB_ROOT: /app/DataAgentBench
      KB_ROOT: /app/kb
      PYTHONPATH: /app:/app/DataAgentBench:/app/agent
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-oracleforge}
      PG_DB: ${PG_DB:-postgres}
      MONGO_URI: mongodb://${MONGO_USER:-oracle}:${MONGO_PASSWORD:-oracleforge}@mongodb:27017/
    ports:
      - "${MCP_PORT:-8000}:8000"
    volumes:
      - ./DataAgentBench:/app/DataAgentBench:ro
      - ./kb:/app/kb
      - ./results:/app/results
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - oracle-net
    command: ["python", "mcp/server.py", "--transport", "sse", "--port", "8000"]

# ── Volumes ────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  mongo_data:

# ── Networks ───────────────────────────────────────────────────────────────
networks:
  oracle-net:
    driver: bridge
